<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>
  <rect width="512" height="512" rx="110" ry="110" fill="url(#shine)"/>

  <!-- Crystal/gem shape (memory/AI symbolism) -->
  <!-- Outer diamond -->
  <polygon points="256,96 400,220 256,420 112,220"
           fill="white" opacity="0.92"/>

  <!-- Inner facets -->
  <polygon points="256,96 400,220 256,260"
           fill="white" opacity="0.25"/>
  <polygon points="256,96 112,220 256,260"
           fill="white" opacity="0.10"/>
  <polygon points="256,420 400,220 256,260"
           fill="white" opacity="0.18"/>
  <polygon points="256,420 112,220 256,260"
           fill="white" opacity="0.30"/>

  <!-- Centre dot -->
  <circle cx="256" cy="260" r="14" fill="white" opacity="0.80"/>
</svg>
